<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic Vocabulary Flashcards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f4ef; padding: 20px; color: #1a1a1a; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 16px; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .controls button { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; transition: all 0.15s; }
  .controls button.active { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }
  .counter { font-size: 13px; color: #888; margin-left: auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 14px; }
  .card { height: 210px; cursor: pointer; perspective: 700px; }
  .inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.5s ease; }
  .card.flipped .inner { transform: rotateY(180deg); }
  .face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 14px; border: 1px solid #e0dfd8; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 14px; }
  .front { background: white; }
  .back { background: #e1f5ee; transform: rotateY(180deg); }
  .arabic { font-size: 28px; font-weight: 500; color: #1a1a1a; direction: rtl; text-align: center; line-height: 1.4; }
  .hint { font-size: 11px; color: #bbb; }
  .translation { font-size: 14px; font-weight: 500; color: #085041; text-align: center; line-height: 1.4; }
  .card-svg { width: 68px; height: 68px; }
  .tag { font-size: 10px; color: #aaa; position: absolute; top: 8px; right: 10px; }
</style>
</head>

let current = 'all';

function filterCards(lesson, btn) {
  current = lesson;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = current === 'all' ? vocab : vocab.filter(v => v.lesson === current);
  document.getElementById('counter').textContent = filtered.length + ' cards';
  grid.innerHTML = filtered.map((v, i) => `
    <div class="card" id="card-${i}" onclick="this.classList.toggle('flipped')">
      <div class="inner">
        <div class="face front">
          <span class="tag">${v.lesson.replace('lesson','L')}</span>
          <div class="arabic">${v.arabic}</div>
          <div class="hint">tap to reveal</div>
        </div>
        <div class="face back">
          <div class="card-svg">${v.svg}</div>
          <div class="translation">${v.translation}</div>
        </div>
      </div>
    </div>
  `).join('');
}

renderGrid();
</script>
